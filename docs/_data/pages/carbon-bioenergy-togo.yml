sections:
  - structure: text
    text:
      en: |
        BioEnergy Togo is an NGO soon incorporated whose goal is to carry out a project of collection and valorization of residual materials and biogas-solar co-energy in the great Kloto.

        For more information, please visit (in French) [Bio Énergie Togo (bioenergietogo.org)](https://www.bioenergietogo.org).
      fr: |
        Bioénergie Togo est une ONG en cours de constitution dont l'objectif est de mener à bien un projet de collecte et de valorisation des déchets et de co-énergie biogaz-solaire dans le Grand Kloto.

        Pour plus d'informations, veuillez consulter le site web suivant : [Bioénergie Togo (bioenergietogo.org)](https://www.bioenergietogo.org).
