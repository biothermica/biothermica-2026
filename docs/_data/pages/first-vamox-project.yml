      fr: |
        ### Biothermica a construit la première unité d'oxydation VAM opérationnelle dans une mine
            de charbon active à Amérique du Nord
        
        En 2004, Biothermica a lancé le développement d'une nouvelle technologie désormais connue sous le
        nom de VAMOX®, qui consiste à adapter sa technologie RTO brevetée BIOTOX® pour la réduction de
        la VAM. Au fil des années, Biothermica a étudié les spécificités des opérations minières de charbon et
        a a été activement impliqué auprès des parties prenantes du rétablissement VAM à travers le monde.

        Suite à la signature d'un accord de coopération pour un projet de démonstration technique avec Walter
        Energy en 2007, un premier système VAMOX® de démonstration d'une capacité de 30 000 m² était commandé début
        2009 par Biothermica Technologies Inc. dans le souterrain de Walter Energy mine de charbon
        n° 4 à Brookwood, Alabama.

        Ce système fut la première unité d'oxydation VAM opérationnelle dans une mine active à North Amérique. Au cours
        de ses quatre (4) années d'activité (de mars 2009 à mars 2013), elle Généré 80 766 crédits carbone sur plus
        de 27 000 heures d'exploitation en moyenne taux de disponibilité de 93 %. Le projet a été arrêté lorsque la
        concentration de méthane n'a pas été atteinte assez longue pour soutenir la rentabilité du projet. Les crédits
        carbone, au départ enregistrés sous le protocole CMM Climate Action Reserve (CAR), ont ensuite été convertis
        en Air Ressources Tablègue des crédits de compensation (ARBOCs) et vendus.

