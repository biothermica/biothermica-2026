      en: |
        ### [The Vamox® RTO solution](/content/vamox-rto-solution/)

        The Vamox® RTO solution creates opportunities to value Ventilation Air Methane (VAM), a wasted resource, by generating carbon credits and/or power.

        ---

        ## What is VAM?

        Coal mining activities release a large amount of methane. As methane is a potent greenhouse gas (GHG) with a global warming potential (GWP) 25 times that of carbon dioxide, it is estimated that global annual methane emissions from coal mining could represent more than 1 billion tons carbon dioxide equivalent.

        Underground mines are by far the largest source of fugitive methane emissions in the coal sector, representing about 90% of total emissions.

        The control of methane concentrations underground is crucial to ensure the safety of miners. Two methods are used:
        - Ventilation
        - Gas drainage

        ---

        ### VAM (Ventilation Air Methane)

        A large volume of air is circulated throughout the mine working area to dilute methane concentrations below explosive levels.

        High-powered exhaust mine fans vent this air to the atmosphere.

        - ~70% of global coal mining emissions come from VAM
        - Estimated emissions: ~700 MtCO₂e per year
        - Methane concentration: typically < 1%

        Despite containing significant energy, this low concentration has limited its use.

        👉 The [Vamox® RTO solution](/content/vamox-rto-solution/) developed by Biothermica enables:
        - Carbon credit generation
        - Energy recovery

        ---

        ### Drainage Gas (Coal Mine Methane)

        Drainage systems supplement ventilation by removing methane before or after mining.

        These systems:
        - Use boreholes (surface or underground)
        - Capture methane from coal seams and surrounding strata

        Captured gas is called **Coal Mine Methane (CMM)**.

        Unused CMM can be:
        - Mixed with VAM
        - Used to regulate methane concentration
        - Improve project profitability

        ---

        ## Generating Carbon Credits from VAM

        Since VAM abatement is not mandatory, carbon credits are the main incentive.

        - Methane is **25× more potent than CO₂**
        - Each ton of methane oxidized = **22.25 tCO₂e reduction**

        ![Methane Oxidation](/sites/biothermica.com/files/oxid-methane.png)

        ---

        ### Policy Support

        - California adopted the **Mine Methane Capture Protocol** (July 1, 2014)
        - Enables carbon credit generation under cap-and-trade

        - Québec has also implemented a similar protocol

        ---

        ### Economic Viability

        - Required carbon price: ~$10–$12/tCO₂e
        - Recent prices have exceeded this threshold

        Currently, only:
        - United States
        - Canada

        have strong enough carbon markets to support standalone VAM projects.

        ---

        ### U.S. VAM Data (EPA)

        - Total emissions: **2.4 MCM methane**
        - 29 vent shafts economically viable (> ~0.4% methane)

        ![Total VAM Emissions](/sites/biothermica.com/files/total-vam-emissions.png)

        ---

        ## Generating Power from VAM

        Even at low concentration, VAM contains significant energy.

        Example:
        - 300,000 scfm airflow
        - 1% methane concentration
        - ≈ **50 MW thermal energy**

        ---

        ### Energy Recovery Methods

        #### 1. Heat Recovery
        - Heat exchangers recover low-grade heat
        - Used for district heating

        #### 2. Organic Rankine Cycle (ORC)
        - Converts waste heat into electricity

        #### 3. Steam Cycle (Preferred)
        - Uses high-grade heat from combustion chamber
        - Maximizes power generation

        ---

        ![Energy Graph 1](/sites/biothermica.com/files/graphic1_2_0.png)

        ![Energy Graph 2](/sites/biothermica.com/files/graphic2_0.png)

        ![Energy Graph 3](/sites/biothermica.com/files/graphic3_0.png)

        ---

        ## Learn More

        [CLICK HERE](/contact.html) to request a document presenting an overview of waste heat recovery strategies for a Vamox® RTO.

      fr: |
        ### [La solution Vamox® RTO](/content/vamox-rto-solution/)

        La solution Vamox® RTO crée des opportunités de valoriser le méthane d'air de ventilation (VAM), une ressource gaspillée, en générant des crédits carbone et/ou de l'électricité.

        ---

        ## Qu'est-ce que le VAM?

        Les activités minières du charbon libèrent une grande quantité de méthane. Comme le méthane est un gaz à effet de serre puissant (GES) avec un potentiel de réchauffement climatique (GWP) 25 fois supérieur à celui du dioxyde de carbone, on estime que les émissions mondiales annuelles de méthane issues de l'extraction du charbon pourraient représenter plus de 1 milliard de tonnes équivalent dioxyde de carbone.

        Les mines souterraines sont de loin la plus grande source d'émissions de méthane fugitif dans le secteur du charbon, représentant environ 90 % des émissions totales.

        Le contrôle des concentrations de méthane sous terre est crucial pour assurer la sécurité des mineurs. Deux méthodes sont utilisées :

        - Ventilation
        - Drainage des gaz

        ---

        ### VAM (Méthane de l'air de ventilation)

        Un grand volume d'air circule dans toute la zone de travail de la mine pour diluer les concentrations de méthane en dessous des niveaux explosifs.

        Des ventilateurs d'extraction à haute puissance pour mine évacuent cet air vers l'atmosphère.

        - ~70 % des émissions mondiales de l'extraction du charbon proviennent de la VAM
        - Émissions estimées : ~700 MtCO₂e par an
        - Concentration en méthane : typiquement < 1%

        Bien qu'elle contienne une énergie importante, cette faible concentration a limité son utilisation.

        👉 La [solution Vamox® RTO](/content/vamox-rto-solution/) développée par Biothermica permet :
        - Génération de crédits carbone
        - Récupération d'énergie

        ---

        ### Gaz de drainage (méthane de mine de charbon)

        Les systèmes de drainage complètent la ventilation en retirant le méthane avant ou après l'extraction.

        Ces systèmes :
        - Utiliser des forages (de surface ou souterrains)
        - Capter le méthane des veines de charbon et des strates environnantes

        Le gaz capturé est appelé **Méthane de mines de charbon (CMM)**.

        Un CMM inutilisé peut être :
        - Mixte avec VAM
        - Utilisé pour réguler la concentration en méthane
        - Améliorer la rentabilité du projet

        ---

        ## Générer des crédits carbone à partir de la VAM

        Comme la réduction de la VAM n'est pas obligatoire, les crédits carbone sont la principale incitation.

        - Le méthane est **25× plus puissant que le CO₂**
        - Chaque tonne de méthane oxydée = **22,25 tCO₂e de réduction**

        ! [Oxydation du méthane](/sites/biothermica.com/files/oxid-methane.png)

        ---

        ### Soutien politique

        - La Californie a adopté le **Protocole de capture du méthane dans les mines** (1er juillet 2014)
        - Permet la génération de crédits carbone dans le cadre du plafonnement et échange

        - Le Québec a également mis en place un protocole similaire

        ---

        ### Viabilité économique

        - Prix carbone requis : ~10 $ à 12 $/tCO₂e
        - Les prix récents ont dépassé ce seuil

        Actuellement, uniquement :

        -États-Unis
        -Canada

        disposent de marchés carbone suffisamment solides pour soutenir des projets VAM autonomes.

        ---

        ### Données VAM américaines (EPA)

        - Émissions totales : **2,4 MCM méthane**
        - 29 puits d'évents économiquement viables (> ~0,4 % de méthane)

        ! [Émissions totales de VAM](/sites/biothermica.com/files/total-vam-emissions.png)

        ---

        ## Production d'énergie à partir de VAM

        Même à faible concentration, le VAM contient une énergie significative.

        Exemple :
        - Débit d'air de 300 000 scfm
        - 1 % de concentration en méthane
        - ≈ **50 MW d'énergie thermique**

        ---

        ### Méthodes de récupération d'énergie

        #### 1. Récupération de chaleur
        - Les échangeurs de chaleur récupèrent la chaleur de faible qualité
        - Utilisé pour le chauffage urbain

        #### 2. Cycle organique de Rankine (ORC)
        - Convertit la chaleur residuale en électricité

        #### 3. Cycle à vapeur (Préféré)
        - Utilise une chaleur de haute qualité provenant de la chambre de combustion
        - Maximise la production d'électricité

        ---

        ![Energy Graph 1](/sites/biothermica.com/files/graphic1_2_0.png)

        ![Energy Graph 2](/sites/biothermica.com/files/graphic2_0.png)

        ![Energy Graph 3](/sites/biothermica.com/files/graphic3_0.png)

