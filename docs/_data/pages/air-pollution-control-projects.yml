    text:
      en: |
        Since 1990, the BIOTOX® regenerative thermal oxidizer has been used successfully in more than twenty-five (25) installations in Canada and the U.S. Biothermica’s BIOTOX® RTO projects have demonstrated destruction efficiencies of more than 99% and energy efficiencies greater than 90%, for flows varying from 2,000 ACFM to more than 150,000 ACFM. Here is a selection of several projects:

        #### Special applications

        - [Asphalt Shingle Plant](/air-pollution-control/projects/27/42.html) (3)
        - [Kraft Pulp Plant](/air-pollution-control/projects/27/44.html) (1)
        - [Anode manufacturing plant (aluminium smelters)](/air-pollution-control/projects/27/45.html) (1)
        - [Brasque treatment plant](/air-pollution-control/projects/27/46.html) (1)
        - [Magnesium plant](/air-pollution-control/projects/27/47.html) (1)

        #### Conventional applications

        - [Painting booth](/air-pollution-control/projects/29/43.html) (3)
        - [Graphic art and printing](/air-pollution-control/projects/29/48.html) (3)
        - [Textile](/air-pollution-control/projects/29/49.html) (1)
        - [Agro-food](/air-pollution-control/projects/29/50.html) (1)
        - [Flooring](/air-pollution-control/projects/29/51.html) (1)
        - [Petrochemicals](/air-pollution-control/projects/29/52.html) (1)

      fr: |
        Depuis 1990, la technologie d'oxydation thermique régénérative BIOTOX® a été démontrée avec succès dans plus de vingt-cinq (25) installations au Canada et aux États-Unis, affichant un rendement de destruction supérieur à 99%, un rendement énergétique supérieur à 90%, et ceci pour des débits variant entre 2 000 acfm et plus de 150 000 acfm. Voici une sélection de quelques projets d'OTR :

        #### Applications particulières

        - [Usine de bardeaux d’asphalte](/fr/assainissement/projets/27/42.html) (3)
        - [Usine de pâtes kraft](/fr/assainissement/projets/27/44.html) (1)
        - [Usine de fabrication d’anodes (aluminerie)](/fr/assainissement/projets/27/45.html) (1)
        - [Usine de traitement des brasques usées](/fr/assainissement/projets/27/46.html) (1)
        - [Usine de magnésium](/fr/assainissement/projets/27/47.html) (1)

        #### Applications conventionnelles

        - [Atelier de peinture](/fr/assainissement/projets/29/43.html) (3)
        - [Art graphique et imprimerie](/fr/assainissement/projets/29/48.html) (3)
        - [Textile](/fr/assainissement/projets/29/49.html) (1)
        - [Agro-alimentaire](/fr/assainissement/projets/29/50.html) (1)
        - [Couvre-plancher](/fr/assainissement/projets/29/51.html) (1)
        - [Pétrochimie](/fr/assainissement/projets/29/52.html) (1)

        **Tags:** [OTR ; oxydation thermique régénérative](/fr/tags/otr-oxydation-thermique-r%c3%a9g%c3%a9n%c3%a9rative.html)
