      en: |
        ## Awards and Distinctions

        Since 1987, Biothermica has earned several awards and honors for its innovative solutions and projects, including the following distinctions:

        - **2022** – ESG Impact Initiative of the Year, *Mines and Money Outstanding Achievement Awards*

        - **2012** – Clean Technology Later Stage Award, *Global Cleantech Cluster Association (GCCA)*
        - **2010** – Environmental Phoenix Award (Québec)
        - **2009** – Induction into the Canadian Hall of Excellence
        - **2008** – “Prix Mérite” Award, *Association of Polytechnique Graduates*
        - **2008** – Michel Jurdant Distinction, *RÉSEAU Environnement (Québec)*

        - **2007** – Pierre Dansereau Distinction, *RÉSEAU Environnement (Québec)*

        - **2006** – Honorable Distinction, *Municipality of San Salvador*

        - **2002** – Ecogeste GHG Reduction Award (Québec)

        - **1999** – John D. Sensenbaugh Award, *U.S. Air & Waste Management Association (AWMA)*
        - **1998** – Tribute to Excellence, *Bankers Association of Canada*
        - **1998** – Finalist, *Mercuriades (Québec)*

        - **1997** – Innovation Award, *Quebec Industrial Research Association*
        - **1997** – “Prix Mérite Environnemental” Award, *Québec Ministry of Environment*
        - **1995** – Award for Excellence in Management, *National Bank of Canada*
        - **1994** – Finalist, *Mercuriades – Innovation & Design Category*

        - **1994** – Canada Business Excellence Award (Innovation), *Industry Canada*
        - **1992** – Energia Award, *Quebec Association for the Management of Energy*

      fr: |
        ## Prix et distinctions

        Depuis 1987, Biothermica a remporté plusieurs prix et distinctions pour ses projets et technologies :

        - **2022** – Prix Initiative à impact ESG de l'année, *Mines and Money – Outstanding Achievement Awards*

        - **2012** – Prix international Clean Technology Later Stage Award (catégorie bioénergie), *Global Cleantech Cluster Association (GCCA)*
        - **2010** – Prix Phénix de l'environnement (Québec)
        - **2009** – Intronisation au Temple canadien de l'excellence, *Institut national de qualité*
        - **2008** – Distinction Michel Jurdant, *RÉSEAU Environnement*
        - **2008** – Prix Mérite, *Association des diplômés de Polytechnique*

        - **2007** – Distinction Pierre Dansereau, *RÉSEAU Environnement*

        - **2006** – Mention honorable, *Municipalité de San Salvador*

        - **2002** – Prix Écogeste du Gouvernement du Québec pour la réduction des GES (centrale Gazmont)

        - **1999** – Prix Innovation J. Deane Sensenbaugh, *Air & Waste Management Association (AWMA), Saint-Louis (Missouri)*
        - **1998** – Hommage à l'excellence, *Association des banquiers du Canada*
        - **1998** – Finaliste aux *Mercuriades (Chambre de commerce du Québec)*

        - **1997** – Prix Innovation, *Association de la recherche industrielle du Québec (ADRIQ)*
        - **1997** – Prix Mérite environnemental, *Ministère de l'Environnement du Québec*
        - **1995** – Prix d’excellence en gestion, *Banque Nationale du Canada*
        - **1994** – Prix Canada Excellence en affaires (catégorie innovation), *Industrie Canada*

        - **1994** – Finaliste aux *Mercuriades (catégorie Innovation et Design)*
        - **1992** – Prix Énergia, *Association québécoise pour la maîtrise de l’énergie (AQME)*
