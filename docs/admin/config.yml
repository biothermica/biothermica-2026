locale: 'fr'
slug:
  encoding: "ascii"
  clean_accents: true
  sanitize_replacement: "_"

backend:
  name: github
  repo: biothermica/biothermica-2026
  branch: master
  base_url: https://app.staticauth.com
  auth_endpoint: /auth/github/repo/69a8ca192824f5bdecb860ee

media_folder: "docs/media"
public_folder: "/media"

collections:
  - name: 'articles'
    create: true
    label: 'Articles'
    folder: 'docs/_data/multi/articles/'
    slug: '{{year}}-{{month}}-{{day}}-{{slug}}'
    # I'd like the summary to show the date, but I can't because of
    # https://github.com/decaporg/decap-cms/issues/7753, so I have to
    # use a mydate field.
    summary: "{{fields.mydate}} - {{title}}"
    sortableFields: ["mydate"]
    fields:
      - label: 'Titre en français'
        name: 'title'
        widget: 'string'
      - label: 'Titre en anglais'
        name: 'title_en'
        widget: 'string'
        required: false
      - label: 'Date (yyyy-mm-dd)'
        name: 'mydate'
        widget: 'string'
        required: false
      - label: 'Contenu en français'
        name: 'body'
        widget: 'markdown'
        required: false
      - label: 'Contenu en anglais'
        name: 'body_en'
        widget: 'markdown'
        required: false
      - label: 'Documents en français'
        name: 'documents'
        widget: 'list'
        required: false
        field: {label: Document, name: document, widget: file, required: false}
      - label: 'Documents en anglais'
        name: 'documents_en'
        widget: 'list'
        required: false
        field: {label: Document, name: document, widget: file, required: false}
      - label: 'Redirects en français'
        description: "Ajouter des redirections pour les anciennes URL de cet article. Par exemple: /fr/ancien-article"
        name: 'redirects'
        widget: 'list'
        required: false
        field: {label: Redirect, name: redirect, widget: string, required: false}
      - label: 'Redirects en anglais'
        description: "Ajouter des redirections pour les anciennes URL de cet article. Par exemple: /en/old-article"
        name: 'redirects_en'
        widget: 'list'
        required: false
        field: {label: Redirect, name: redirect, widget: string, required: false}
  - name: 'projects'
    create: true
    label: 'Projets'
    folder: 'docs/_data/multi/projects'
    slug: '{{year}}-{{month}}-{{day}}-{{slug}}'
    summary: '{{title}} (ordre: {{ordre}})'
    sortableFields: ["ordre"]
    fields:
      - label: 'Titre administratif (non affiché sur le site)'
        name: 'title'
        widget: 'string'
      - label: 'Ordre (par exemple arbre est affiché avant zèbre)'
        name: 'ordre'
        widget: 'string'
        required: false
      - label: 'Titre en français'
        name: 'title_fr'
        widget: 'string'
        required: false
      - label: 'Titre en anglais'
        name: 'title_en'
        widget: 'string'
        required: false
      - label: 'Image'
        name: 'image'
        widget: 'image'
        required: false
      - label: 'Description en français'
        name: 'description'
        widget: 'markdown'
        required: false
      - label: 'Description en anglais'
        name: 'description_en'
        widget: 'markdown'
        required: false
  - name: "documents"
    label: "Documents"
    files:
      - file: "docs/_data/documents.yml"
        label: "Liste des documents"
        name: "documents_list"
        fields:
          - label: "Documents"
            name: "items"
            summary: '{{fields.date}} - {{fields.title}} ({{ fields.lang }})'
            sortableFields: ["date", "lang", "title"]
            widget: "list"
            fields:
              - label: "Titre"
                name: "title"
                widget: "string"
              - label: "Date (yyyy-mm-dd)"
                name: "date"
                widget: "string"
              - label: "Langue"
                name: "lang"
                widget: "select"
                options:
                - fr
                - en
              - label: "Type"
                name: "type"
                widget: "select"
                options:
                - communiqué
                - présentation
                - publication
                - brochure
                - politique
              - label: "Document"
                name: "document"
                widget: "file"
  - name: "awards"
    label: "Prix"
    files:
      - file: "docs/_data/awards.yml"
        label: "Liste des prix"
        name: "awards_list"
        fields:
          - label: "Prix"
            name: "items"
            widget: "list"
            fields:
              - label: "Titre administratif (non affiché sur le site)"
                name: "title"
                string: "string"
              - label: "Name"
                name: "name"
                widget: "object"
                fields:
                  - { label: "English", name: "en", widget: "string" }
                  - { label: "French", name: "fr", widget: "string" }
              - label: "Media"
                name: "media"
                widget: "object"
                fields:
                  - { label: "Image", name: "path", widget: "image" }

                  - label: "Alt Text"
                    name: "alt"
                    widget: "object"
                    fields:
                      - { label: "English", name: "en", widget: "string" }
                      - { label: "French", name: "fr", widget: "string" }
