{% comment %}
sections:
  - structure: documents
    type: communiqués
{% endcomment %}
<div class="content-wrapper style2">
  <div class="inner">
    <div class="container">
      <div id="content">
        <article>
          <ul>
            {% for document in site.data.documents.items | order: "date" %}
              {% if document.type == _type and document.lang == _lang %}
                <li>
                  <a href="{{ document.document }}">{{ document.date }} - {{ document.title }}</a>
                </li>
              {% endif %}
            {% endfor %}
          </ul>
        </article>
      </div>
    </div>
  </div>
</div>
