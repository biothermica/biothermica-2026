{% comment %}
sections:
  - structure: threetabs
    tabs:
      fr:
      - id: tab1
        title: Tab 1
      - id: tab2
        title: Tab 2
      - id: tab3
        title: Tab 3
      en:
      - id: tab1
        title: Tab 1
      - id: tab2
        title: Tab 2
      - id: tab3
        title: Tab 3
{% endcomment %}
{% for tab in _tabs %}
  <div class="tab">
    <input type="radio" id="{{ tab.id }}" name="tab-group" {% if forloop.first %}checked{% endif %}>
    <label for="{{ tab.id }}">{{ tab.title }}</label>
  </div>
{% endfor %}
