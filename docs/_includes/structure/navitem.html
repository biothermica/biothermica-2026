{% assign _path = _navitem.url %}
{% assign _label = _navitem.title %}
<li>
  <a href="{{ _path }}">{{ _label }}</a>
  {% if _navitem.children %}
  <ul>
  {% for child in _navitem.children %}
    {% assign _childpath = child.url %}
    {% assign _childlabel = child.title %}
    <li><a href="{{ _childpath }}">{{ _childlabel }}</a></li>
  {% endfor %}
  </ul>
  {% endif %}
</li>
